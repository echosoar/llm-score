<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>LLM Score</title>
  <style>
    :root {
      --background: #101214;
      --surface: #171a1e;
      --surface-hover: #1d2228;
      --text: #e8eaed;
      --muted: #99a1aa;
      --accent: #78b7ff;
      --line: #2b3138;
      --focus: #b7dcff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--background);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(100%, 1800px);
      margin: 0 auto;
      padding: 44px 32px 32px;
    }

    header {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 650;
      letter-spacing: -0.03em;
    }

    .description,
    #status {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    #status {
      margin: 0;
      text-align: right;
      white-space: nowrap;
    }

    .lang-toggle {
      padding: 5px 12px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      white-space: nowrap;
    }

    .lang-toggle:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .header-right {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      gap: 6px;
    }

    .brand-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 4px;
      max-width: 100%;
    }

    .brand-chip {
      padding: 5px 12px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
    }

    .brand-chip:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .brand-chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #0b1726;
    }

    .table-wrap {
      overflow-x: auto;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    table {
      width: 100%;
      min-width: 2180px;
      border-collapse: collapse;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      padding: 14px 12px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    thead {
      background: var(--surface);
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.055em;
      text-transform: uppercase;
    }

    tbody tr {
      border-top: 1px solid var(--line);
    }

    tbody tr:hover {
      background: var(--surface-hover);
    }

    .sort-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      letter-spacing: inherit;
      text-align: inherit;
      text-transform: inherit;
      cursor: pointer;
    }

    .sort-button::after {
      color: #637080;
      content: "↕";
      font-size: 13px;
      line-height: 1;
    }

    .sort-button[aria-sort="ascending"]::after {
      color: var(--accent);
      content: "↑";
    }

    .sort-button[aria-sort="descending"]::after {
      color: var(--accent);
      content: "↓";
    }

    .sort-button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .model-name {
      color: #fff;
      font-weight: 600;
    }

    .numeric {
      text-align: right;
    }

    .dimensional-score {
      color: #c9d9ea;
    }

    .missing {
      color: #68727d;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .website-link::after {
      content: " ↗";
      font-size: 11px;
    }

    .empty,
    .error {
      padding: 44px 12px;
      color: var(--muted);
      text-align: center;
    }

    .error { color: #ffb4ab; }

    @media (max-width: 680px) {
      main { padding: 28px 16px 20px; }
      header { align-items: start; flex-direction: column; gap: 8px; }
      #status { text-align: left; white-space: normal; }
    }

    .site-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .footer-link {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-link:hover {
      text-decoration: underline;
    }

    .footer-counter {
      display: block;
      height: 48px;
      width: auto;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>LLM Score</h1>
        <p class="description" data-i18n="description">模型综合多维度测试评分与基准测试表现，使用最新汇率计算价格</p>
        <div class="brand-filter" id="brand-filter" role="group" aria-label="厂商过滤"></div>
      </div>
      <div class="header-right">
        <button class="lang-toggle" id="lang-toggle" type="button" aria-label="切换语言">EN</button>
        <p id="status" aria-live="polite" data-i18n="loading">正在加载数据…</p>
      </div>
    </header>

    <div class="table-wrap">
      <table id="score-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>

    <footer class="site-footer">
      <a class="footer-link" href="https://github.com/echosoar/llm-score" target="_blank" rel="noopener">GitHub</a>
      <img class="footer-counter" src="https://not.aiznb.com/img?url=https://echosoar.github.io/llm-score/"  />
    </footer>
  </main>

  <script>
    const table = document.querySelector('#score-table');
    const tableHead = table.querySelector('thead');
    const tableBody = table.querySelector('tbody');
    const status = document.querySelector('#status');
    const brandFilter = document.querySelector('#brand-filter');
    const langToggle = document.querySelector('#lang-toggle');

let models = [];
let benchmarks = [];
let priceMap = {};
let rankMap = new Map();
let priceNormMap = new Map();
    let sortState = { key: 'score', direction: 'desc' };
    let selectedBrands = new Set();
    let lang = 'zh';

    const i18n = {
      zh: {
        description: '模型综合评分与基准测试表现',
        loading: '正在加载数据…',
        loadFailed: '数据加载失败',
        status: (m, b) => `${m} 个模型 · ${b} 个 benchmarks`,
        brandGroup: '厂商过滤',
        colRank: '#',
        colModel: '模型名称',
        colBrand: '厂商',
        colScore: '性能指数',
        colTime: '发布日期',
        colInput: '输入格式',
        colOutput: '输出格式',
        colInputPrice: '输入价格（1M）',
        colInputCachedPrice: '输入缓存价格（1M）',
        colOutputPrice: '输出价格（1M）',
        colPriceIndex: '价格指数',
        colPriceScore: '价格综合指数',
        colContext: '输入窗口',
        colGenerate: '输出窗口',
        colUrl: '官网',
        website: '官网',
        emptyError: '无法加载 score.json。请通过 HTTP 服务打开此页面，而不是直接打开本地文件。',
        noDataError: 'score.json 不包含可显示的模型或 benchmark 数据。',
        toggleLabel: 'EN',
      },
      en: {
        description: 'Comprehensive LLM scores and benchmark performance',
        loading: 'Loading data…',
        loadFailed: 'Failed to load data',
        status: (m, b) => `${m} models · ${b} benchmarks`,
        brandGroup: 'Vendor filter',
        colRank: '#',
        colModel: 'Model',
        colBrand: 'Vendor',
        colScore: 'Performance Index',
        colTime: 'Release Date',
        colInput: 'Input Formats',
        colOutput: 'Output Formats',
        colInputPrice: 'Input Price (1M)',
        colInputCachedPrice: 'Cache Input Price (1M)',
        colOutputPrice: 'Output Price (1M)',
        colPriceIndex: 'Price Index',
        colPriceScore: 'Price Composite Index',
        colContext: 'Context Window',
        colGenerate: 'Output Window',
        colUrl: 'Website',
        website: 'Website',
        emptyError: 'Unable to load score.json. Please serve this page over HTTP instead of opening the local file directly.',
        noDataError: 'score.json does not contain displayable model or benchmark data.',
        toggleLabel: '中',
      },
    };

    const t = (key) => (typeof key === 'function' ? key() : i18n[lang][key] ?? key);

    const getBenchmarkScore = (model, benchmark) =>
      model.currentBenchmarksScores?.[benchmark] ?? null;

    const formatScore = (value) => {
      if (value === null || value === undefined) return '-';
      return Number(value).toFixed(4);
    };

    const formatBenchmarkScore = (value) => {
      if (value === null || value === undefined) return '-';
      if (Math.abs(value) >= 100) {
        return Number(value).toLocaleString('en-US', { maximumFractionDigits: 1 });
      }
      return Number(value).toLocaleString('en-US', { maximumFractionDigits: 4 });
    };

const formatFormats = (formats) =>
  Array.isArray(formats) && formats.length ? formats.join(' / ') : '-';

const formatWindow = (value) => {
  if (value === null || value === undefined || value === '') return '-';
  const num = Number(value);
  if (!Number.isFinite(num)) return String(value);
  if (num % (1024 * 1024) === 0) {
    return `${num / (1024 * 1024)}M`;
  }
  if (num % 1024 === 0) {
    const k = num / 1024;
    return k >= 1024 ? `${k / 1024}M` : `${k}K`;
  }
  if (num >= 1000000) {
    const m = num / 1000000;
    return `${Number.isInteger(m) ? m : m.toFixed(2).replace(/\.?0+$/, '')}M`;
  }
  if (num >= 1000) {
    const k = num / 1000;
    return `${Number.isInteger(k) ? k : k.toFixed(1).replace(/\.?0+$/, '')}K`;
  }
  return String(num);
};

const PRICE_REGEX = /^([￥$])\s*([\d.]+)$/;

const getPriceAmount = (price) => {
  if (price === null || price === undefined || price === '') return null;
  const match = PRICE_REGEX.exec(String(price).trim());
  if (!match) return null;
  const [, symbol, amount] = match;
  const num = Number(amount);
  if (!Number.isFinite(num)) return null;
  const target = lang === 'zh' ? '￥' : '$';
  if (symbol === target) return num;
  if (!priceMap['$'] || !priceMap['￥']) return num;
  const rate = target === '￥' ? priceMap['$'] / priceMap['￥'] : priceMap['￥'] / priceMap['$'];
  return num * rate;
};

const formatPrice = (price) => {
  if (price === null || price === undefined || price === '') return '-';
  const amount = getPriceAmount(price);
  if (amount === null) return String(price);
  const target = lang === 'zh' ? '￥' : '$';
  const rounded = Number.isInteger(amount) ? amount : Number(amount.toFixed(2));
  return `${target}${rounded}`;
};

const getPriceIndex = (model) => {
  const input = getPriceAmount(model.inputPrice);
  if (input === null) return null;
  const cached = getPriceAmount(model.inputCachedPrice);
  const output = getPriceAmount(model.outputPrice);
  if (output === null) return null;
  return input * 5 + (cached ?? input) * 20 + output * 1;
};

const formatPriceIndex = (model) => {
  const value = getPriceIndex(model);
  if (value === null) return '-';
  const target = lang === 'zh' ? '￥' : '$';
  const rounded = Number.isInteger(value) ? value : Number(value.toFixed(2));
  return `${target}${rounded}`;
};

const getPriceMultiplier = (model) => priceNormMap.get(model.model) ?? null;

const getPriceScore = (model) => {
  const multiplier = getPriceMultiplier(model);
  if (multiplier === null || model.score === null || model.score === undefined) return null;
  return model.score * Math.sqrt((multiplier + 0.1) * 0.9);
};

    const getSortValue = (model, key) => {
      if (key.startsWith('benchmark:')) {
        return getBenchmarkScore(model, key.slice('benchmark:'.length));
      }
      if (key === 'inputPrice' || key === 'inputCachedPrice' || key === 'outputPrice') {
        return getPriceAmount(model[key]);
      }
      if (key === 'priceIndex') return getPriceIndex(model);
      if (key === 'priceScore') return getPriceScore(model);
      if (key === 'input' || key === 'output') return formatFormats(model[key]);
      return model[key] ?? null;
    };

    const compareValues = (left, right) => {
      const leftMissing = left === null || left === undefined || left === '';
      const rightMissing = right === null || right === undefined || right === '';
      if (leftMissing || rightMissing) return leftMissing === rightMissing ? 0 : leftMissing ? 1 : -1;
      if (typeof left === 'number' && typeof right === 'number') return left - right;
      return String(left).localeCompare(String(right), 'zh-CN', { numeric: true, sensitivity: 'base' });
    };

    const sortModels = () => {
      const { key, direction } = sortState;
      const multiplier = direction === 'asc' ? 1 : -1;
      const filtered = selectedBrands.size
        ? models.filter((model) => selectedBrands.has(model.brand))
        : models;
      return filtered.sort((left, right) => {
        const result = compareValues(getSortValue(left, key), getSortValue(right, key));
        return result === 0 ? left.model.localeCompare(right.model, 'zh-CN') : result * multiplier;
      });
    };

    const makeHeader = (label, key, sortable) => {
      const cell = document.createElement('th');
      cell.scope = 'col';
      if (!sortable) {
        cell.textContent = label;
        return cell;
      }

      const button = document.createElement('button');
      button.className = 'sort-button';
      button.type = 'button';
      button.textContent = label;
      button.setAttribute('aria-sort', sortState.key === key
        ? (sortState.direction === 'asc' ? 'ascending' : 'descending')
        : 'none');
      button.addEventListener('click', () => {
        sortState = {
          key,
          direction: sortState.key === key && sortState.direction === 'desc' ? 'asc' : 'desc',
        };
        render();
      });
      cell.append(button);
      return cell;
    };

    const renderHeader = () => {
      const row = document.createElement('tr');
      row.append(
        makeHeader(t('colRank'), null, false),
        makeHeader(t('colModel'), 'model', false),
        makeHeader(t('colBrand'), 'brand', false),
        makeHeader(t('colScore'), 'score', true),
        makeHeader(t('colPriceScore'), 'priceScore', true),
        makeHeader(t('colTime'), 'time', true),
        makeHeader(t('colInput'), 'input', true),
        makeHeader(t('colOutput'), 'output', true),
        makeHeader(t('colInputPrice'), 'inputPrice', true),
        makeHeader(t('colInputCachedPrice'), 'inputCachedPrice', true),
        makeHeader(t('colOutputPrice'), 'outputPrice', true),
        makeHeader(t('colContext'), 'context', true),
        makeHeader(t('colGenerate'), 'generate', true),
      );
      benchmarks.forEach((benchmark) => {
        row.append(makeHeader(benchmark, `benchmark:${benchmark}`, true));
      });
      row.append(makeHeader(t('colUrl'), 'url', true));
      tableHead.replaceChildren(row);
    };

    const appendTextCell = (row, text, className = '') => {
      const cell = document.createElement('td');
      cell.textContent = text;
      if (className) cell.className = className;
      row.append(cell);
    };

    const renderRows = () => {
      const rows = sortModels();
      const fragment = document.createDocumentFragment();
      rows.forEach((model) => {
        const row = document.createElement('tr');
        appendTextCell(row, String(rankMap.get(model.model) ?? '-'), 'numeric');
        appendTextCell(row, model.model, 'model-name');
        appendTextCell(row, model.brand);
        appendTextCell(row, formatScore(model.score), 'numeric');
        appendTextCell(row, formatScore(getPriceScore(model)), 'numeric');
        appendTextCell(row, model.time ?? '-', model.time ? '' : 'missing');
        appendTextCell(row, formatFormats(model.input), model.input?.length ? '' : 'missing');
        appendTextCell(row, formatFormats(model.output), model.output?.length ? '' : 'missing');
        appendTextCell(row, formatPrice(model.inputPrice), 'numeric');
        appendTextCell(row, formatPrice(model.inputCachedPrice), 'numeric');
        appendTextCell(row, formatPrice(model.outputPrice), 'numeric');
        appendTextCell(row, formatWindow(model.context), 'numeric');
        appendTextCell(row, formatWindow(model.generate), 'numeric');

        benchmarks.forEach((benchmark) => {
          const value = getBenchmarkScore(model, benchmark);
          appendTextCell(
            row,
            formatBenchmarkScore(value),
            value === null || value === undefined ? 'numeric missing' : 'numeric dimensional-score',
          );
        });

        const websiteCell = document.createElement('td');
        if (model.url) {
          const link = document.createElement('a');
          link.className = 'website-link';
          link.href = model.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = t('website');
          websiteCell.append(link);
        } else {
          websiteCell.className = 'missing';
          websiteCell.textContent = '-';
        }
        row.append(websiteCell);
        fragment.append(row);
      });
      tableBody.replaceChildren(fragment);
    };

    const renderBrandFilter = () => {
      const counts = new Map();
      models.forEach((model) => {
        const brand = model.brand;
        counts.set(brand, (counts.get(brand) ?? 0) + 1);
      });
      const brands = [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || String(a[0]).localeCompare(String(b[0]), 'zh-CN', { sensitivity: 'base' }))
        .map(([brand]) => brand);
      const fragment = document.createDocumentFragment();
      brands.forEach((brand) => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'brand-chip';
        chip.dataset.brand = brand;
        chip.textContent = brand;
        const pressed = selectedBrands.has(brand);
        chip.setAttribute('aria-pressed', String(pressed));
        chip.addEventListener('click', () => {
          if (selectedBrands.has(brand)) selectedBrands.delete(brand);
          else selectedBrands.add(brand);
          render();
        });
        fragment.append(chip);
      });
      brandFilter.replaceChildren(fragment);
    };

    const render = () => {
      renderBrandFilter();
      renderHeader();
      renderRows();
    };

    const applyLanguage = () => {
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('[data-i18n]').forEach((node) => {
        const key = node.dataset.i18n;
        const value = i18n[lang][key];
        if (typeof value === 'string') node.textContent = value;
      });
      langToggle.textContent = i18n[lang === 'zh' ? 'en' : 'zh'].toggleLabel;
      langToggle.setAttribute('aria-label', lang === 'zh' ? 'Switch to English' : '切换为中文');
      brandFilter.setAttribute('aria-label', i18n[lang].brandGroup);
    };

    langToggle.addEventListener('click', () => {
      lang = lang === 'zh' ? 'en' : 'zh';
      applyLanguage();
      render();
      if (models.length && benchmarks.length) {
        status.textContent = i18n[lang].status(models.length, benchmarks.length);
      }
    });

    const showError = (message) => {
      tableHead.replaceChildren();
      const row = document.createElement('tr');
      const cell = document.createElement('td');
      cell.className = 'error';
      cell.textContent = message;
      row.append(cell);
      tableBody.replaceChildren(row);
    };

    fetch('./score.json')
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        models = (Array.isArray(data.models) ? data.models : []).map((entry) => ({
          ...entry.modelInfo,
          score: entry.rank,
        }));
        priceMap = data.priceMap ?? {};
        benchmarks = (Array.isArray(data.benchmarks) ? data.benchmarks : [])
          .filter((benchmark) => !benchmark.upgrade)
          .map((benchmark) => benchmark.name);

        if (!models.length || !benchmarks.length) {
          throw new Error(i18n[lang].noDataError);
        }

        rankMap = new Map(
          [...models]
            .sort((a, b) => compareValues(getSortValue(b, 'score'), getSortValue(a, 'score'))
              || a.model.localeCompare(b.model, 'zh-CN'))
            .map((model, index) => [model.model, index + 1]),
        );
        priceNormMap = (() => {
          const items = models
            .map((model) => ({ model, index: getPriceIndex(model) }))
            .filter(({ index }) => index !== null);
          const indices = items.map(({ index }) => index);
          const min = Math.min(...indices);
          const max = Math.max(...indices);
          const range = max - min;
          const map = new Map();
          items.forEach(({ model, index }) => {
            const norm = range === 0 ? 1 : (max - index) / range;
            map.set(model.model, norm);
          });
          return map;
        })();

        render();
        status.textContent = i18n[lang].status(models.length, benchmarks.length);
      })
      .catch((error) => {
        console.error('Unable to load score.json:', error);
        status.textContent = i18n[lang].loadFailed;
        showError(i18n[lang].emptyError);
      });
  </script>
</body>
</html>
